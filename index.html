<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhagavad-gita Tal Como Es — Original Macmillan 1972</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #1a1a2e;
      color: #e0d6c8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
      max-width: 800px;
    }
    h1 {
      font-size: 2rem;
      color: #f5c842;
      margin-bottom: 0.3rem;
    }
    h2 {
      font-size: 1.1rem;
      font-weight: normal;
      color: #c4a265;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #a89880;
    }
    .video-container {
      width: 100%;
      max-width: 800px;
      padding: 1.5rem 1rem;
    }
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    footer {
      margin-top: auto;
      padding: 2rem 1rem;
      text-align: center;
      font-size: 0.85rem;
      color: #6a6050;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bhagavad-gita Tal Como Es</h1>
    <h2>Traducido del original Macmillan 1972</h2>
    <p class="subtitle">Su Divina Gracia A.C. Bhaktivedanta Swami Prabhupada</p>
  </header>
  <main class="video-container">
    <div class="video-wrapper">
      <iframe
        src="https://www.youtube.com/embed/BgFg54pSAQM"
        title="Bhagavad-gita Tal Como Es"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </main>
  <footer>
    <p>Hare Krishna Hare Krishna Krishna Krishna Hare Hare / Hare Rama Hare Rama Rama Rama Hare Hare</p>
  </footer>
</body>
</html>
